# swing-cam server configuration
# This file lives at ~/.swingcam/config.yaml
# Edit with: swingcam config

server:
  host: "0.0.0.0"
  web_port: 9555

# Video stream settings (must match what the Pi sends)
stream:
  width: 1280
  height: 720
  fps: 30

cameras:
  # Pi cameras (TCP listen — Pi pushes H.264 to server):
  - name: "face-on"
    host: "0.0.0.0"
    port: 9556               # matches `swingcam stream ff`
    angle: "face-on"

  - name: "dtl"
    host: "0.0.0.0"
    port: 9557               # matches `swingcam stream dtl`
    angle: "dtl"

  # IP cameras (RTSP — server pulls from camera):
  # - name: "face-on"
  #   source: "rtsp://192.168.4.50:554/stream1"
  #   angle: "face-on"
  #
  # USB cameras (plugged into the server):
  # - name: "face-on"
  #   source: "avfoundation://0"   # macOS (device index or name)
  #   angle: "face-on"
  # - name: "dtl"
  #   source: "v4l2:///dev/video0" # Linux
  #   angle: "dtl"

detection:
  # Motion detection via frame differencing
  motion_threshold: 25        # Pixel difference threshold (0-255)
  motion_area_pct: 1.5        # % of frame that must be "moving" to trigger
  cooldown_seconds: 5         # Min seconds between swing detections
  # Region of interest (normalized 0.0-1.0, x, y, w, h)
  # Crop to just the hitting area to reduce false positives
  roi: null                   # null = full frame, or [0.2, 0.1, 0.6, 0.8]
  # Confidence threshold for swing detection (0.0-1.0)
  # Higher = fewer false positives, lower = more sensitive
  confidence_threshold: 0.5
  # Max duration (seconds) of a motion spike to count as a swing
  # Sustained motion longer than this is rejected (walking, etc)
  spike_max_seconds: 1.0

clips:
  pre_seconds: 3              # Seconds before swing trigger to include
  post_seconds: 6             # Seconds after swing trigger to include
  output_dir: "~/.swingcam/clips"
  format: "mp4"
  # Max total disk usage for clips in MB. Oldest clips are deleted when exceeded.
  # Set to null for unlimited.
  max_storage_mb: null

buffer:
  max_seconds: 20             # Circular buffer size per camera (seconds of video in RAM)

correlation:
  # For multi-camera setups: max time gap (seconds) between detections
  # on different cameras to consider them the same swing
  window_seconds: 2.0

database:
  path: "~/.swingcam/swings.db"

logging:
  level: "INFO"               # DEBUG, INFO, WARNING, ERROR
  log_dir: "~/.swingcam/logs"
  max_bytes: 10485760         # Max log file size in bytes (default 10MB)
  backup_count: 5             # Number of rotated log files to keep
